server:
  port: 8085

spring:
  application:
    name: reports-service

  datasource:
    # Asegúrate de crear esta base de datos en Postgres
    url: jdbc:postgresql://localhost:5432/piedrazul_reports_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO